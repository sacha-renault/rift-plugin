[package]
name = "clack-hug"
version = "0.1.0"
edition = "2024"

[dependencies]
bon = "3.8.2"
clack-plugin = { git = "https://github.com/prokopyl/clack"}
clack-extensions = { git = "https://github.com/prokopyl/clack", features = [
  "audio-ports",
  "clack-plugin",
  "gui",
  "note-ports",
  "params",
  "raw-window-handle_05",
  "state",
  "latency"
] }
vizia = { git = "https://github.com/sacha-renault/vizia", branch = "event-queue-per-instance"}
vizia_baseview = { git = "https://github.com/sacha-renault/vizia", branch = "event-queue-per-instance"}
raw-window-handle = "0.5.0"
log = "0.4"
paste = "1.0.15"



[workspace]
resolver = "2"
members = []
