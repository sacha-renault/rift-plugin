[package]
name = "clack-hug"
version = "0.1.0"
edition = "2024"

[dependencies]
bon = "3.8.2"
clack-plugin = { git = "https://github.com/prokopyl/clack"}
clack-extensions = { git = "https://github.com/prokopyl/clack", features = [
  "audio-ports",
  "clack-plugin",
  "gui",
  "note-ports",
  "params",
  "raw-window-handle_05",
  "state",
] }
baseview = { git = "https://github.com/vizia/baseview.git", rev = "bd7774294ebd6a4ea497e9c02655a4abd0408137", features = ["opengl"] }
vizia = { git = "https://github.com/vizia/vizia" }
vizia_baseview = { git = "https://github.com/vizia/vizia" }
raw-window-handle = "0.5.0"
log = "0.4"



[workspace]
resolver = "2"
members = []